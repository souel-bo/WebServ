# ====================================================
#       WEBSERV COMPLEX CONFIGURATION TEST
# ====================================================

# --- SERVER 1: The Main Website (Port 8080) ---
server {
    listen 8081;
    host 127.0.0.1;
    server_name localhost example.com;

    # Default error pages
    error_page 400 /errors/400.html;
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;
    error_page 500 /errors/500.html;
    error_page 501 /errors/501.html;
    error_page 502 /errors/502.html;
    error_page 503 /errors/503.html;

    client_max_body_size 1024; # Small limit (1KB)

    # 1. Standard Root
    location / {
        root ./www/html/www/files;
        index index.html;
        autoindex on;
        allow_methods GET POST;
    }

    # 2. Python CGI Handling
    location /cgi-bin {
        root ./www/html/www/files; 
        allow_methods GET POST;
    }

    # 3. Redirection (Google)
    location /google {
        return 301 https://www.google.com;
    }

    # 3-bis. Local redirection to login page
    location /signin {
        return 302 /login;
    }

    # 3-ter. Redirect /home to website root
    location /home {
        return 301 /;
    }

    # 4. Alias Test (Maps /images to a different folder)
    location /images {
        alias ./www/assets/images;
        autoindex off;
        allow_methods GET;
    }

    # 5. Protected Upload Directory
    location /uploads {
        root ./www/html/www/files;
        
        # FIX 1: Added GET so your CGI scripts can actually be tested via the browser!
        allow_methods GET POST DELETE; 
        
        autoindex on;
        
        # FIX 2: Reduced this number to 500MB (500000000 bytes).
        client_max_body_size 500000000; 
    }
}

# --- SERVER 2: The "Admin" Interface (Port 9090) ---
server {
    listen 9091;
    host 127.0.0.1;
    server_name admin.local;

    root ./www/admin;

    # Admin error pages
    error_page 400 /errors/400.html;
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;
    error_page 500 /errors/500.html;
    error_page 501 /errors/501.html;
    error_page 502 /errors/502.html;
    error_page 503 /errors/503.html;

    client_max_body_size 10000000; # 10MB

    # Admin redirection shortcut
    location /admin-login {
        return 302 /;
    }

    # Test 1: The standard root (Looks for dashboard.html, blocks if missing)
    location / {
        index dashboard.html;
        autoindex off;
        allow_methods GET;
    }

    # Test 2: The Upload & View Ground
    # Added GET here so your browser is actually allowed to view the autoindex!
    location /uploads {
        allow_methods GET POST DELETE; 
        autoindex on;
        client_max_body_size 10000000;
    }

    # Test 3: The Autoindex Engine Test (Should show files)
    location /open_folder {
        allow_methods GET;
        autoindex on;
    }

    # Test 4: The Security Lockdown Test (Should throw 403)
    location /secret_folder {
        allow_methods GET;
        autoindex off;
    }

    # Only DELETE allowed here
    location /database {
        allow_methods DELETE;
    }
}