<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - WebServ</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #374151;
      --input-bg: #1f2937;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 22px;
      font-size: 0.95rem;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: inline-block;
      margin-bottom: 6px;
      font-size: 0.92rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .remember input {
      width: auto;
    }

    a {
      color: #93c5fd;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.97rem;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 2px;
    }

    button:hover {
      background: var(--accent-hover);
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Login</h1>
    <p class="subtitle">Sign in to create a session cookie</p>

    <form action="/login" method="GET">
      <div>
        <label for="user">Username</label>
        <input id="user" name="user" type="text" placeholder="your username" required />
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required />
      </div>

      <button type="submit">Sign In</button>
    </form>
  </main>
</body>
</html>
