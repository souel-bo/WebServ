<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e5e7eb;
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
    }
    main {
      max-width: 700px;
      width: 100%;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }
    p {
      margin: 8px 0;
      color: #cbd5e1;
      line-height: 1.4;
    }
    a {
      color: #93c5fd;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    code {
      background: #1f2937;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Dashboard</h1>
    <p>You are on a protected route.</p>
    <p>If your session is not logged in, the server should redirect you to <code>/login</code>.</p>
    <p>To test login in browser, open <a href="../login.html">/login</a> and submit username.</p>
  </main>
</body>
</html>
